syntax = "proto3";

package SfgGenerator.Proto;

// this is the state of the effect
message ParamMultiplex {
  uint32 gui_width = 101;
  uint32 gui_height = 102;

  // params
  double output_param = 1001;
  uint64 amount_params = 1002;
  uint64 selected_param = 1003;
  repeated double params = 1004;
}
