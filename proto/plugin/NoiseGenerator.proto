syntax = "proto3";

package SfgGenerator.Proto;

// this is the state of the generator
message NoiseGenerator {
  // internal types
  enum SineWaveType {
    StdSin = 0;
    CSin = 1;
  }
  enum SquareWaveType {
    PhaseWidth = 0;
    InversePhaseWidth = 1;
  }
  enum SawWaveType {
    Phase = 0;
    InversePhase = 1;
  }
  enum TriangleWaveType {
    ChunkLerp = 0;
  }
  enum WhiteNoiseType {
    StdRandom = 0;
    RandMaxRand = 1;
  }
  enum PinkNoiseType {
    PaulKellettRefined = 0;
    PaulKellettEconomy = 1;
    VossMcCartney = 2;
    IirFilterApproximation = 3;
  }
  enum RedNoiseType {
    BasicIntegration = 0;
    LeakyIntegration = 1;
    IntegerWalk = 2;
    OnePoleIirFilter = 3;
    CumulativeWithClamp = 4;
  }
  enum BlueNoiseType {
    VoidAndCluster = 0;
    PoissonDiskSampling = 1;
    SimpleSpectralShaping = 2;
    R2JitteredSampling = 3;
    PermutedGradientNoise = 4;
  }
  enum VioletNoiseType {
    FirstOrderDifference = 0;
    FirstOrderIirFilter = 1;
  }
  enum GreyNoiseType {
    PsychoacousticFilter = 0;
    AweightingInversion = 1;
    MultiBandpass = 2;
    EqualLoudnessApproximation = 3;
  }
  enum VelvetNoiseType {
    SporadicImpulse = 0;
  }

  uint32 gui_width = 101;
  uint32 gui_height = 102;

  // params
  SineWaveType synth_sine_wave_type = 1010;
  double synth_sine_wave_attack = 1015;
  double synth_sine_wave_decay = 1016;
  double synth_sine_wave_sustain = 1017;
  double synth_sine_wave_release = 1018;
  double synth_sine_wave_mix = 1019;
  SquareWaveType synth_square_wave_type = 1020;
  double synth_square_wave_pwm = 1021;
  double synth_square_wave_attack = 1025;
  double synth_square_wave_decay = 1026;
  double synth_square_wave_sustain = 1027;
  double synth_square_wave_release = 1028;
  double synth_square_wave_mix = 1029;
  SawWaveType synth_saw_wave_type = 1030;
  double synth_saw_wave_attack = 1035;
  double synth_saw_wave_decay = 1036;
  double synth_saw_wave_sustain = 1037;
  double synth_saw_wave_release = 1038;
  double synth_saw_wave_mix = 1039;
  TriangleWaveType synth_triangle_wave_type = 1040;
  double synth_triangle_wave_attack = 1045;
  double synth_triangle_wave_decay = 1046;
  double synth_triangle_wave_sustain = 1047;
  double synth_triangle_wave_release = 1048;
  double synth_triangle_wave_mix = 1049;
  WhiteNoiseType synth_white_noise_type = 1050;
  double synth_white_noise_attack = 1055;
  double synth_white_noise_decay = 1056;
  double synth_white_noise_sustain = 1057;
  double synth_white_noise_release = 1058;
  double synth_white_noise_mix = 1059;
  PinkNoiseType synth_pink_noise_type = 1060;
  uint64 synth_pink_noise_VossMcCartney_number = 1061;
  double synth_pink_noise_attack = 1065;
  double synth_pink_noise_decay = 1066;
  double synth_pink_noise_sustain = 1067;
  double synth_pink_noise_release = 1068;
  double synth_pink_noise_mix = 1069;
  RedNoiseType synth_red_noise_type = 1070;
  double synth_red_noise_attack = 1075;
  double synth_red_noise_decay = 1076;
  double synth_red_noise_sustain = 1077;
  double synth_red_noise_release = 1078;
  double synth_red_noise_mix = 1079;
  BlueNoiseType synth_blue_noise_type = 1080;
  double synth_blue_noise_attack = 1085;
  double synth_blue_noise_decay = 1086;
  double synth_blue_noise_sustain = 1087;
  double synth_blue_noise_release = 1088;
  double synth_blue_noise_mix = 1089;
  VioletNoiseType synth_violet_noise_type = 1090;
  double synth_violet_noise_attack = 1095;
  double synth_violet_noise_decay = 1096;
  double synth_violet_noise_sustain = 1097;
  double synth_violet_noise_release = 1098;
  double synth_violet_noise_mix = 1099;
  GreyNoiseType synth_grey_noise_type = 1100;
  double synth_grey_noise_attack = 1105;
  double synth_grey_noise_decay = 1106;
  double synth_grey_noise_sustain = 1107;
  double synth_grey_noise_release = 1108;
  double synth_grey_noise_mix = 1109;
  VelvetNoiseType synth_velvet_noise_type = 1110;
  double synth_velvet_noise_attack = 1115;
  double synth_velvet_noise_decay = 1116;
  double synth_velvet_noise_sustain = 1117;
  double synth_velvet_noise_release = 1118;
  double synth_velvet_noise_mix = 1119;
}
